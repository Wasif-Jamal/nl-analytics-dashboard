schema: spec-driven

# Project context (shown to AI when creating artifacts).
# Concise, pointer-style — full detail lives in the source-of-truth files.
context: |
  Product: Natural Language Analytics Dashboard. Business users ask plain-English
  questions; the app generates read-only SQL, runs it, and returns the clearest form —
  a chart for multi-row data or a written sentence for a single value — plus actionable
  insights grounded in the returned data and one-click follow-up questions. Streamlit UI;
  no SQL knowledge required. (docs/FRS.md §1-2)

  Tech stack: Python >=3.12; uv for packaging/env (pyproject.toml, uv.lock); FastAPI (backend
  HTTP API, ASGI via Uvicorn); Streamlit (UI); LangChain (LLM); LangGraph (state-driven
  workflow orchestration); SQLAlchemy + SQLite; Pandas; Plotly; Pydantic (typed contracts). (docs/SDS.md §3)

  Layout: backend lives under app/ (entry app/main.py); UI under website/ (entry website/app.py).

  Architecture constraints (docs/SDS.md §2,6-9; docs/decisions/technical_architecture.md §17; docs/FRS.md §9,13,14):
  - Supervisor-over-subagents pattern: User -> Streamlit (website/) ->
    FastAPI (app/routes/) -> Chat Service -> supervisor -> agent subagents
    (SqlAgent, VisualizationAgent, InsightAgent, FollowupAgent) -> Repository -> SQLite.
  - Every agent is a create_agent() instance with its own LLM, prompt, and internal tools.
    Internal tools are invisible to the supervisor; the supervisor invokes each agent as a subagent.
    AnalyticsGraph (app/orchestration/graph.py) builds the supervisor and wires in the subagents.
  - SQL Agent internal tools: generate_sql, validate_sql, execute_sql (calls POST /api/query).
    Analysis agents (Visualization, Insight, Followup) run in parallel after SQL Agent succeeds.
  - Agent outputs are typed Pydantic schemas written to WorkflowState via Command
    (SQLGenerationOutput, ChartConfig, InsightOutput, FollowupOutput) — never unstructured data.
    WorkflowState subclasses MessagesState; tools read prior results via InjectedState.
  - FastAPI routes hold no business logic; they delegate to the Chat Service
    (app/services/chat_service.py), the only component that runs the workflow (the compiled graph).
  - The SQL Agent is the ONLY component allowed to touch the database (via its execute_sql tool
    → POST /api/query → QueryRouter → QueryRepository); it self-corrects invalid SQL through
    its own LLM-driven ReAct loop.
  - Repositories hold no business logic. Agent outputs are typed Pydantic schemas written to state
    via Command (SQLGenerationOutput, ChartConfig, InsightOutput, FollowupOutput) — never unstructured data.
  - Read-only SQL only: SELECT allowed; INSERT/UPDATE/DELETE/DROP/ALTER/TRUNCATE blocked.
  - Out of scope: authentication/authorization, forecasting/predictive modeling, autonomous
    actions. Insights must be grounded in returned data — never fabricate figures or claims.

  Team conventions (CLAUDE.md):
  - Class-based/OOP for application code (agents, services, repositories, nodes are classes
    with one responsibility; constructor-injected deps; one primary class per module).
  - Prompts live in app/prompts/ — never hardcoded in agents.
  - Use the centralized logger from app/config/log_config.py — never print().
  - Docstrings on every module, public class, and public function/method.
  - Conventional Commits (type(scope): subject); branches type/short-desc.

  Quality standards (CLAUDE.md §7; docs/FRS.md §12):
  - Gates in order before commit: `uv run ruff check .` -> `uv run ruff format --check .`
    -> `uv run pytest`. pytest is the active gate until ruff is added (`uv add --dev ruff`).
  - No build step (Streamlit app). Typical query response < 10s; datasets up to ~1M rows.

  Source of truth (these win on conflict): AGENTS.md, CLAUDE.md, docs/FRS.md, docs/SDS.md.

